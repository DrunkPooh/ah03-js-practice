<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AH_03_신정호 JavaScript 실습과제</title>
  <style>
    body {
      font-family: Arial;
      margin: 30px;
    }

    section {
      margin-bottom: 20px;
    }

    button {
      margin-top: 5px;
    }

    input {
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>AH_03_신정호 JavaScript 실습과제</h1>

  <section>
    <h3>1. 버튼 클릭 이벤트</h3>
    <button id="btn1">클릭</button>
  </section>

  <section>
    <h3>2. 텍스트 바꾸기</h3>
    <p id="text1">여기 문장이 바뀝니다.</p>
    <button id="btn2">문장 바꾸기</button>
  </section>

  <section>
    <h3>3. 실시간 입력</h3>
    <input type="text" id="nameInput" placeholder="이름 입력">
    <p>입력한 이름: <span id="namePrint"></span></p>
  </section>

  <section>
    <h3>4. 마우스 이벤트</h3>
    <p id="mouseText">여기에 마우스를 올려보세요.</p>
  </section>

  <section>
    <h3>5. 스타일 변경</h3>
    <p id="styleText">이 글자 스타일이 바뀝니다.</p>
    <button id="btn3">스타일 바꾸기</button>
  </section>

  <section>
    <h3>6. 점수 판별</h3>
    <input type="number" id="score" placeholder="점수 입력">
    <button id="btn4">확인</button>
    <p id="result"></p>
  </section>

  <section>
    <h3>7. 콘솔 계산기</h3>
    <button id="btn5">계산기 실행</button>
    <p>결과는 화면이 아니라 Console에 출력됩니다.</p>
  </section>

  <script src="AH_03_신정호_js실습과제.js"></script>
</body>
</html>
